<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="footer-seal">归</div>
        <p class="footer-desc">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-links">
        <h4 class="footer-heading">栏目</h4>
        <div class="footer-links-inline">
          {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="footer-link">{{ .Name }}</a>
          {{ end }}
        </div>
      </div>
      <div class="footer-meta">
        <h4 class="footer-heading">联系</h4>
        {{ with .Site.Params.email }}
          <a href="mailto:{{ . }}" class="footer-link">{{ . }}</a>
        {{ end }}
      </div>
    </div>
    <div class="footer-bottom">
      <span>传承不泥古 · 创新不离宗</span>
      <span>&copy; {{ now.Year }} {{ .Site.Title }}</span>
    </div>
  </div>
</footer>
