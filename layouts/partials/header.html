<header class="site-header" id="siteHeader">
  <div class="header-inner container">
    <a href="{{ .Site.BaseURL }}" class="header-logo">
      <span class="logo-seal">归</span>
      <span class="logo-text">归云集</span>
    </a>
    <button class="header-toggle" id="headerToggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <nav class="header-nav" id="headerNav">
      {{ $currentURL := .RelPermalink }}
      {{ range .Site.Menus.main }}
        {{ $isHome := eq .URL "/" }}
        {{ $urlWithSlash := printf "%s/" .URL }}
        {{ $isActive := or (eq $currentURL .URL) (eq $currentURL $urlWithSlash) }}
        <a href="{{ .URL }}" class="nav-link{{ if $isActive }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
