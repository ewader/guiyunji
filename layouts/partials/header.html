<!-- 站点头部 -->
<header class="site-header">
    <div class="container">
        <!-- 顶部装饰线 -->
        <div class="header-decoration"></div>
        
        <!-- 导航栏 -->
        <nav class="site-nav">
            <!-- Logo 和标题 -->
            <a href="{{ .Site.BaseURL }}" class="site-brand">
                {{ if .Site.Params.logo }}
                    <img src="{{ .Site.Params.logo }}" alt="{{ .Site.Title }}" class="site-logo">
                {{ end }}
                <span class="site-title">{{ .Site.Title }}</span>
            </a>
            
            <!-- 主导航菜单 -->
            <div class="nav-menu" id="navMenu">
                {{ $currentURL := .RelPermalink }}
                {{ range .Site.Menus.main }}
                    {{ $isActive := eq $currentURL .URL }}
                    <a href="{{ .URL }}" class="nav-item{{ if $isActive }} active{{ end }}">
                        {{ .Name }}
                    </a>
                {{ end }}
            </div>
            
            <!-- 移动端菜单按钮 -->
            <button class="menu-toggle" id="menuToggle" aria-label="切换菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </div>
</header>

<style>
/* 头部样式 */
.site-header {
    background: var(--bg-primary);
    border-bottom: 2px solid var(--border-color);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
}

.header-decoration {
    height: 3px;
    background: linear-gradient(90deg, var(--cinnabar-red), var(--bamboo-green), var(--ink-black));
    opacity: 0.6;
}

.site-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--spacing-md) 0;
}

.site-brand {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    text-decoration: none;
}

.site-logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
}

.site-title {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink-black);
}

.nav-menu {
    display: flex;
    gap: var(--spacing-xl);
    list-style: none;
}

.nav-item {
    font-family: var(--font-serif);
    font-size: 1rem;
    color: var(--text-primary);
    text-decoration: none;
    padding: var(--spacing-sm) 0;
    position: relative;
    transition: color var(--transition-fast);
}

.nav-item::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: var(--cinnabar-red);
    transition: width var(--transition-normal), left var(--transition-normal);
}

.nav-item:hover::after,
.nav-item.active::after {
    width: 100%;
    left: 0;
}

.nav-item:hover,
.nav-item.active {
    color: var(--cinnabar-red);
}

/* 印章样式的活动状态 */
.nav-item.active::before {
    content: '';
    position: absolute;
    top: 0;
    right: -4px;
    width: 6px;
    height: 6px;
    background: var(--cinnabar-red);
    border-radius: 50%;
}

/* 移动端菜单按钮 */
.menu-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: var(--spacing-xs);
}

.menu-toggle span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--ink-black);
    transition: all var(--transition-normal);
}

.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
}

.menu-toggle.active span:nth-child(2) {
    opacity: 0;
}

.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -6px);
}

/* 响应式 */
@media (max-width: 768px) {
    .site-title {
        font-size: 1.25rem;
    }
    
    .menu-toggle {
        display: flex;
    }
    
    .nav-menu {
        position: fixed;
        top: 100%;
        left: 0;
        right: 0;
        flex-direction: column;
        gap: 0;
        background: var(--bg-primary);
        border-top: 1px solid var(--border-color);
        max-height: 0;
        overflow: hidden;
        transition: max-height var(--transition-normal);
        box-shadow: var(--shadow-md);
    }
    
    .nav-menu.active {
        max-height: 400px;
    }
    
    .nav-item {
        padding: var(--spacing-md) var(--spacing-lg);
        border-bottom: 1px solid var(--border-light);
    }
    
    .nav-item:hover::after,
    .nav-item.active::after {
        width: 0;
    }
}
</style>
