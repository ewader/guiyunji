            <p class="list-item-excerpt">小暑刚至，梅雨方歇。江南一带的空气里还残留着湿漉漉的水汽，翻一翻书架上的旧书，指尖便能感受到纸张微微的潮意。这时候，中国古代的读书人便会张罗一件重要的夏日雅事——曝书。
曝书，也叫晒书，就是将家中的藏书搬到阳光下晾晒，利用紫外线和高温驱除书 …</p>
