baseURL = 'https://guiyun.l22.org/'
title = '归云集'

# 网站描述
description = "归云集 - 传承中华文化，弘扬民族精神。涵盖诗词、书法、国画、茶道、汉服、传统节日、诸子百家等中国传统文化内容。"

# 网站关键词
keywords = "中国传统文化, 诗词, 书法, 国画, 茶道, 汉服, 传统节日, 诸子百家, 国学"

# 作者信息
author = "归云集"

# 网站语言
locale = 'zh-CN'
defaultContentLanguage = "zh-cn"

# 启用功能
enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true
buildFuture = true

# 分页配置
[pagination]
pagerSize = 20
path = "page"

# 税务配置
[taxonomies]
  category = "categories"
  tag = "tags"

# 菜单配置
[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "传统文化"
    url = "/categories/传统文化"
    weight = 2
  [[menu.main]]
    name = "艺术"
    url = "/categories/艺术"
    weight = 3
  [[menu.main]]
    name = "历史"
    url = "/categories/历史"
    weight = 4
  [[menu.main]]
    name = "传统节日"
    url = "/categories/传统节日"
    weight = 5
  [[menu.main]]
    name = "工艺"
    url = "/categories/工艺"
    weight = 6
  [[menu.main]]
    name = "建筑"
    url = "/categories/建筑"
    weight = 7
  [[menu.main]]
    name = "关于"
    url = "/about"
    weight = 8

# 参数配置
[params]
  # 网站 Logo
  logo = ""

  # Open Graph 图片
  ogImage = "/images/og-default.jpg"

  # 邮箱
  email = "contact@l22.org"

  # 微信
  wechat = ""

  # ICP 备案号
  icp = ""

  # 谷歌站点验证
  googleSiteVerification = ""

  # 百度站点验证
  baiduSiteVerification = ""

  # 英雄轮播区配置
  [params.hero]
    enabled = true
    maxItems = 5

# 输出格式
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

# 隐私配置
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.x]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

# 标记配置
[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "monokai"
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

# 服务配置
[services]
  [services.googleAnalytics]
    ID = ""
